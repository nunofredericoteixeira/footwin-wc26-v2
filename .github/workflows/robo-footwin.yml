name: Robo Footwin 24-7

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: robo-footwin
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Obter repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: 1 - Atualizar jogos e resultados FIFA
        run: |
          echo "PASTA ATUAL:"
          pwd

          echo ""
          echo "FICHEIROS NA RAIZ:"
          ls -lah

          echo ""
          echo "CAMINHO DO EXCEL NO SCRIPT:"
          grep -n "EXCEL_PATH" atualizar_resultados_fifa.py || true

          echo ""
          echo "TESTE DO EXCEL:"
          python -c 'from pathlib import Path; p=Path("mundial_2026_db.xlsx"); print("Existe:", p.exists()); print("Caminho:", p.resolve()); print("Tamanho:", p.stat().st_size if p.exists() else None)'

          echo ""
          echo "EXECUTAR ATUALIZADOR:"
          python -u atualizar_resultados_fifa.py

      - name: 2 - Aplicar resultados ao Calendario
        run: |
          python aplicar_resultados_atualizacao_no_calendario_v2.py

      - name: 3 - Verificar e adicionar oitavos
        run: |
          python adicionar_oitavos.py

      - name: 4 - Verificar e adicionar quartos
        run: |
          python adicionar_quartos.py

      - name: 5 - Verificar e adicionar meias-finais
        run: |
          python adicionar_meias.py

      - name: 6 - Gerar todos os prognosticos em falta
        run: |
          for i in {1..20}
          do
            OUTPUT=$(python gerar_proximo_prognostico.py 2>&1)
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -qi "Não há jogos elegíveis para prognóstico"; then
              echo "Não existem mais jogos sem prognóstico."
              break
            fi

            if echo "$OUTPUT" | grep -qi "Nao ha jogos elegiveis para prognostico"; then
              echo "Não existem mais jogos sem prognóstico."
              break
            fi
          done

      - name: 7 - Exportar JSON
        run: |
          python exportar_previsoes_json.py

      - name: 8 - Guardar e publicar alteracoes
        run: |
          git config user.name "Footwin Robot"
          git config user.email "actions@github.com"

          git add mundial_2026_db.xlsx
          git add public/previsoes.json

          if git diff --cached --quiet; then
            echo "Sem alteracoes para publicar."
          else
            git commit -m "Atualizacao automatica Footwin $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
