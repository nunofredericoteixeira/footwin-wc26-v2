<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footwin World Cup 2026</title>

  <style>
    :root {
      font-family: Inter, Arial, sans-serif;
      color: #102033;
      background: #eef3f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(
          135deg,
          rgba(5, 14, 30, 0.82) 0%,
          rgba(5, 14, 30, 0.68) 45%,
          rgba(255, 255, 255, 0.18) 100%
        ),
        url("./public/wallpaper_FW.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      min-height: 100vh;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #5ba2ff;
      font-weight: 800;
      font-size: 13px;
      margin: 0 0 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: white;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .subtitle {
      max-width: 620px;
      margin: 18px 0 0;
      color: #d7e6ff;
      font-size: 18px;
    }

    .summary-card {
      min-width: 240px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(16, 32, 51, 0.92);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(16, 32, 51, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .summary-card span {
      color: #9fb2ca;
      font-size: 14px;
    }

    .summary-card strong {
      font-size: 56px;
      line-height: 1;
      margin: 8px 0;
    }

    .summary-card small {
      color: #c7d2e1;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 220px auto;
      gap: 14px;
      margin-bottom: 24px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid #d8e1ec;
      background: white;
      padding: 15px 16px;
      border-radius: 16px;
      font-size: 15px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #1f6feb;
      box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12);
    }

    .betting-button {
      border: 0;
      border-radius: 16px;
      padding: 0 22px;
      font-weight: 900;
      font-size: 15px;
      color: #061426;
      background: linear-gradient(135deg, #39ff14, #b7ff00);
      cursor: pointer;
      box-shadow:
        0 0 14px rgba(57, 255, 20, 0.75),
        0 10px 24px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
    }

    .betting-button.active {
      background: linear-gradient(135deg, #ffd700, #ff9f1a);
      box-shadow:
        0 0 14px rgba(255, 215, 0, 0.85),
        0 10px 24px rgba(0, 0, 0, 0.2);
    }

    .betting-panel {
      display: none;
      margin-bottom: 24px;
      border-radius: 26px;
      background: rgba(5, 14, 30, 0.92);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .betting-panel.open {
      display: block;
    }

    .betting-header {
      padding: 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .betting-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .betting-controls {
      display: grid;
      grid-template-columns: 180px 140px 110px;
      gap: 12px;
      max-width: 470px;
      width: 100%;
    }

    .betting-controls label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: #b7c8dd;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .betting-controls input,
    .betting-controls select {
      padding: 12px;
      border-radius: 12px;
    }

    .betting-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 420px;
    }

    .betting-column {
      padding: 20px;
    }

    .betting-column:first-child {
      border-right: 1px solid rgba(255, 255, 255, 0.12);
    }

    .betting-column h3 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .bet-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .bet-stat {
      border-radius: 14px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .bet-stat span {
      display: block;
      color: #9fb2ca;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .bet-stat strong {
      font-size: 17px;
    }

    .bet-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 520px;
      overflow: auto;
      padding-right: 4px;
    }

    .bet-row {
      display: grid;
      grid-template-columns: 1fr 92px 42px 42px 110px;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .bet-game {
      font-size: 14px;
      line-height: 1.2;
    }

    .bet-game strong {
      display: block;
      color: white;
    }

    .bet-game small {
      display: block;
      color: #9fb2ca;
      margin-top: 4px;
    }

    .odd-input {
      padding: 10px 8px;
      border-radius: 10px;
      text-align: center;
      font-weight: 800;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .odd-input::-webkit-outer-spin-button,
    .odd-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .odd-btn {
      height: 38px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .odd-save {
      background: #39ff14;
      color: #061426;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.65);
    }

    .odd-delete {
      background: #ff1744;
      color: white;
      box-shadow: 0 0 10px rgba(255, 23, 68, 0.65);
    }

    .odd-saved {
      outline: 3px solid rgba(57, 255, 20, 0.55);
    }

    .bet-result {
      text-align: right;
      font-size: 14px;
      font-weight: 900;
    }

    .bet-result.win {
      color: #39ff14;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.8);
    }

    .bet-result.loss {
      color: #ff1744;
      text-shadow: 0 0 8px rgba(255, 23, 68, 0.8);
    }

    .bet-result.pending {
      color: #c7d2e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .match-card {
      position: relative;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(216, 225, 236, 0.85);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 14px 36px rgba(16, 32, 51, 0.08);
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
    }

    .match-card.exact {
      border: 2px solid #ffd700;
      background:
        linear-gradient(135deg, rgba(255, 215, 0, 0.22), rgba(255, 255, 255, 0.95));
      box-shadow:
        0 0 18px rgba(255, 215, 0, 0.95),
        0 0 44px rgba(255, 215, 0, 0.55),
        0 14px 36px rgba(16, 32, 51, 0.16);
    }

    .match-card.exact::before {
      content: "RESULTADO EXATO";
      position: absolute;
      top: -10px;
      right: 18px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #ffd700;
      color: #102033;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.06em;
      box-shadow: 0 0 18px rgba(255, 215, 0, 0.9);
    }

    .match-top {
      display: flex                justify-content: space-between;
    }      gap: 12px;
      color: #617086;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .match-top strong {
      color: #1f6feb;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .team {
     min-height: 118px;
      border-radius: 18px;
      background: #f5f8fb;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      overflow: hidden;
    }

    .team-name {
      font-weight: 800;
      font-size: 15px;
      line-height: 1.1;
      display: block;
      min-height; 34px;
      max-height: 38px;
      overflow: hidden;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
    }

    .score-row.home {
      justify-content: flex-end;
    }

    .score-row.away {
      justify-content: flex-start;
    }

    .team strong {
      font-size: 54px;
      line-height: 0.95;
      color: #102033;
      display: inline-block;
      min-width: 34px;
      text-align: center;
    }

    .logo-shell {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: white;
      border: 1px solid #d8e1ec;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(16, 32, 51, 0.08);
      flex: 0 0 58px;
      overflow: hidden;
    }

    .team-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
      display: block;
    }

    .score-hit {
      color: #39ff14 !important;
      text-shadow:
        0 0 7px rgba(57, 255, 20, 0.95),
        0 0 16px rgba(57, 255, 20, 0.7);
    }

    .score-miss {
      color: #ff1744 !important;
      text-shadow:
        0 0 7px rgba(255, 23, 68, 0.95),
        0 0 16px rgba(255, 23, 68, 0.7);
    }

    .versus {
      color: #8c9aad;
      font-weight: 900;
      font-size: 13px;
    }

    .prediction {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: #102033;
      color: white;
      transition: 0.25s ease;
    }

    .prediction.winner-hit {
      background: #0f3d1f !important;
      box-shadow:
        0 0 14px rgba(57, 255, 20, 0.95),
        0 0 32px rgba(57, 255, 20, 0.65),
        0 0 54px rgba(57, 255, 20, 0.35) !important;
      border: 1px solid rgba(57, 255, 20, 0.95) !important;
    }

    .prediction.winner-miss {
      background: #3d0f1a !important;
      box-shadow:
        0 0 14px rgba(255, 23, 68, 0.95),
        0 0 32px rgba(255, 23, 68, 0.65),
        0 0 54px rgba(255, 23, 68, 0.35) !important;
      border: 1px solid rgba(255, 23, 68, 0.95) !important;
    }

    .prediction span {
      display: block;
      color: #9fb2ca;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .prediction strong {
      display: block;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.25;
    }

    .prediction.winner-hit span {
      color: #c8ffd0 !important;
    }

    .prediction.winner-hit .small-line {
      color: #dcffe1 !important;
    }

    .prediction.winner-miss span {
      color: #ffd0d8 !important;
    }

    .prediction.winner-miss .small-line {
      color: #ffe1e6 !important;
    }

    .small-line {
      margin-top: 6px;
      font-size: 13px;
      color: #c7d2e1;
      line-height: 1.25;
    }

    .empty {
      padding: 30px;
      border-radius: 20px;
      background: white;
      color: #617086;
    }

    @media (max-width: 950px) {
      .hero {
        flex-direction: column;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .betting-split {
        grid-template-columns: 1fr;
      }

      .betting-column:first-child {
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }
    }

    @media (max-width: 620px) {
      .page {
        padding: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .betting-controls {
        grid-template-columns: 1fr;
      }

      .bet-row {
        grid-template-columns: 1fr;
      }

      .bet-result {
        text-align: left;
      }
    }
  
    .match-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .match-date {
      justify-self: start;
      text-align: left;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1f2937;
    }

    .match-time {
      justify-self: center;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }

    .match-group {
      justify-self: end;
      text-align: right;
      font-size: 0.95rem;
      font-weight: 800;
      color: #1f2937;
      white-space: nowrap;
    }

  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Footwin</p>
        <h1>World Cup 2026</h1>
        <p class="subtitle">
          Calendário, prognósticos lançados antes do jogo e validação dos resultados reais.
        </p>
      </div>

      <div class="summary-card">
        <span>Total de jogos</span>
        <strong id="totalJogos">-</strong>
        <small id="atualizadoEm">A carregar...</small>
      </div>
    </section>

    <section class="filters">
      <input
        id="pesquisa"
        type="text"
        placeholder="Pesquisar seleção ou prognóstico..."
      />

      <select id="grupo">
        <option value="Todos">Todos os grupos</option>
      </select>

      <button id="bettingToggle" class="betting-button" type="button">
        Betting Stats
      </button>
    </section>

    <section id="bettingPanel" class="betting-panel">
      <div class="betting-header">
        <h2 class="betting-title">Betting Stats</h2>

        <div class="betting-controls">
          <label>
            Bolsa inicial
            <input id="initialStack" type="number" min="0" step="0.01" value="20" />
          </label>

          <label>
            Valor aposta
            <input id="stakeValue" type="number" min="0" step="0.01" value="1" />
          </label>

          <label>
            Tipo
            <select id="stakeMode">
              <option value="currency">€</option>
              <option value="percent">%</option>
            </select>
          </label>
        </div>
      </div>

      <div class="betting-split">
        <div class="betting-column">
          <h3>1X2</h3>
          <div id="summary1x2" class="bet-summary"></div>
          <div id="betList1x2" class="bet-list"></div>
        </div>

        <div class="betting-column">
          <h3>Resultado Certo</h3>
          <div id="summaryCorrectScore" class="bet-summary"></div>
          <div id="betListCorrectScore" class="bet-list"></div>
        </div>
      </div>
    </section>

    <section id="grid" class="grid"></section>
  </main>

    function n(valor) {
      if (valor === null || valor === undefined || valor === "") return null;

      const texto = String(valor).trim();

      if (
        texto === "-" ||
        texto === "None" ||
        texto === "#VALUE!" ||
        texto === "#REF!" ||
        texto === "#N/A"
      ) {
        return null;
      }

      const numero = Number(texto.replace(",", "."));
      return Number.isFinite(numero) ? numero : null;
    }

    function dinheiro(valor) {
      const numero = Number(valor || 0);
      return `${numero.toFixed(2).replace(".", ",")}€`;
    }

    function vencedor(casa, fora) {
      const c = n(casa);
      const f = n(fora);

      if (c === null || f === null) return "";

      if (c > f) return "casa";
      if (f > c) return "fora";
      return "empate";
    }

    function textoVencedor(jogo, tipo) {
      if (tipo === "casa") return `Vitória ${jogo.casa}`;
      if (tipo === "fora") return `Vitória ${jogo.fora}`;
      if (tipo === "empate") return "Empate";
      return "";
    }

    function escapeHtml(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function slugifyCountry(name) {
      return String(name || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function getLogoPath(teamName) {
      const aliases = {
        "usa": "united-states",
        "eua": "united-states",
        "estados-unidos": "united-states",
        "united-states-of-america": "united-states",

        "south-korea": "south-korea",
        "coreia-do-sul": "south-korea",
        "republica-da-coreia": "south-korea",
        "korea-republic": "south-korea",

        "czech-republic": "czechia",
        "republica-checa": "czechia",
        "chequia": "czechia",

        "turkiye": "turkey",
        "turquia": "turkey",

        "paises-baixos": "netherlands",
        "holanda": "netherlands",

        "africa-do-sul": "south-africa",
        "rsa": "south-africa",

        "cote-d-ivoire": "ivory-coast",
        "costa-do-marfim": "ivory-coast",

        "congo-dr": "dr-congo",
        "rd-congo": "dr-congo",
        "congo-rd": "dr-congo",
        "democratic-republic-of-congo": "dr-congo",

        "cabo-verde": "cape-verde",
        "arabia-saudita": "saudi-arabia",
        "saudi": "saudi-arabia",
        "nova-zelandia": "new-zealand",

        "egito": "egypt",
        "egipto": "egypt",
        "belgica": "belgium",
        "uruguai": "uruguay",
        "japao": "japan",
        "suecia": "sweden",
        "suica": "switzerland",
        "marrocos": "morocco",
        "escocia": "scotland",
        "alemanha": "germany",
        "franca": "france",
        "iraque": "iraq",
        "noruega": "norway",
        "argelia": "algeria",
        "austria": "austria",
        "jordania": "jordan",
        "uzbequistao": "uzbekistan",
        "colombia": "colombia",
        "gana": "ghana",
        "panama": "panama",
        "inglaterra": "england",
        "croacia": "croatia",
        "equador": "ecuador",
        "brasil": "brazil",
        "paraguai": "paraguay",
        "mexico": "mexico",
        "canada": "canada",
        "espanha": "spain",
        "portugal": "portugal",
        "iran": "iran",
        "irao": "iran"
      };

      const rawSlug = slugifyCountry(teamName);
      const slug = aliases[rawSlug] || rawSlug;

      if (!slug) {
        return "";
      }

      return `https://nunofredericoteixeira.github.io/footwin-wc26-v2/public/logos/${slug}.png?v=logos8`;
    }

    function buildLogo(teamName) {
      const src = getLogoPath(teamName);

      if (!src) {
        return "";
      }

      return `
        <div class="logo-shell">
          <img
            class="team-logo"
            src="${src}"
            alt="${escapeHtml(teamName)}"
            loading="lazy"
            onerror="this.parentElement.style.display='none';"
          />
        </div>
      `;
    }

    function analisarJogo(jogo) {
      const prevCasa = n(jogo.previsao_casa);
      const prevFora = n(jogo.previsao_fora);
      const realCasa = n(jogo.resultado_real_casa);
      const realFora = n(jogo.resultado_real_fora);

      const temPrevisao = prevCasa !== null && prevFora !== null;
      const temReal = realCasa !== null && realFora !== null;

      const vencedorPrevisto = temPrevisao ? vencedor(prevCasa, prevFora) : "";
      const vencedorReal = temReal ? vencedor(realCasa, realFora) : "";

      if (!temPrevisao || !temReal) {
        return {
          temPrevisao,
          temReal,
          acertouCasa: false,
          acertouFora: false,
          acertouResultadoExato: false,
          acertouVencedor: false,
          vencedorPrevisto,
          vencedorReal,
        };
      }

      return {
        temPrevisao,
        temReal,
        acertouCasa: prevCasa === realCasa,
        acertouFora: prevFora === realFora,
        acertouResultadoExato: prevCasa === realCasa && prevFora === realFora,
        acertouVencedor: vencedorPrevisto === vencedorReal,
        vencedorPrevisto,
        vencedorReal,
      };
    }

    function classeNumeroPrevisao(analise, lado) {
      if (!analise.temReal || !analise.temPrevisao) return "";

      if (lado === "casa") {
        return analise.acertouCasa ? "score-hit" : "score-miss";
      }

      if (lado === "fora") {
        return analise.acertouFora ? "score-hit" : "score-miss";
      }

      return "";
    }

    function getVisibleGames() {
      if (!dados || !dados.jogos) return [];

      const termo = pesquisaInput.value.toLowerCase().trim();
      const grupo = grupoSelect.value;

      return dados.jogos.filter((jogo) => {
        const passaGrupo = grupo === "Todos" || String(jogo.grupo) === grupo;

        const passaPesquisa =
          !termo ||
          String(jogo.casa).toLowerCase().includes(termo) ||
          String(jogo.fora).toLowerCase().includes(termo) ||
          String(jogo.prognostico).toLowerCase().includes(termo);

        return passaGrupo && passaPesquisa;
      });
    }

    function render() {
      const jogos = getVisibleGames();

      if (jogos.length === 0) {
        grid.innerHTML = '<div class="empty">Não foram encontrados jogos.</div>';
        renderBettingStats();
        return;
      }

      grid.innerHTML = jogos.map((jogo) => {
        const analise = analisarJogo(jogo);

        const cardClass = analise.acertouResultadoExato
          ? "match-card exact"
          : "match-card";

        let predictionClass = "prediction";

        if (analise.temReal && analise.temPrevisao) {
          if (analise.acertouVencedor) {
            predictionClass = "prediction winner-hit";
          } else {
            predictionClass = "prediction winner-miss";
          }
        }

        const previsaoCasa = jogo.previsao_casa || "-";
        const previsaoFora = jogo.previsao_fora || "-";

        const realCasa = jogo.resultado_real_casa || "-";
        const realFora = jogo.resultado_real_fora || "-";

        const classeCasa = classeNumeroPrevisao(analise, "casa");
        const classeFora = classeNumeroPrevisao(analise, "fora");

        const resultadoFinalTexto = analise.temReal
          ? `${escapeHtml(jogo.casa)} ${escapeHtml(realCasa)}-${escapeHtml(realFora)} ${escapeHtml(jogo.fora)}`
          : "Por jogar";

        const prognosticoTexto =
          jogo.prognostico ||
          textoVencedor(jogo, analise.vencedorPrevisto) ||
          "Por calcular";

        const estadoExtra = analise.temReal
          ? `Prognóstico: ${escapeHtml(prognosticoTexto)}`
          : `Prognóstico lançado: ${escapeHtml(prognosticoTexto)}`;

        return `
          <article class="${cardClass}">
            <div class="match-top">
              <span class="match-date">${escapeHtml(jogo.data || "")}</span>
              <span class="match-time">${escapeHtml(jogo.hora || "")}</span>
              <strong class="match-group">Grupo ${escapeHtml(jogo.grupo || "-")}</strong>
            </div>

            <div class="teams">
              <div class="team home">
                <span class="team-name">${escapeHtml(jogo.casa || "-")}</span>
                <div class="score-row home">
                  ${buildLogo(jogo.casa)}
                  <strong class="${classeCasa}">${escapeHtml(previsaoCasa)}</strong>
                </div>
              </div>

              <div class="versus">vs</div>

              <div class="team away">
                <span class="team-name">${escapeHtml(jogo.fora || "-")}</span>
                <div class="score-row away">
                  <strong class="${classeFora}">${escapeHtml(previsaoFora)}</strong>
                  ${buildLogo(jogo.fora)}
                </div>
              </div>
            </div>

            <div class="${predictionClass}">
              <span>${analise.temReal ? "Resultado final real" : "Estado"}</span>
              <strong>${resultadoFinalTexto}</strong>
              <div class="small-line">${estadoExtra}</div>
            </div>
          </article>
        `;
      }).join("");

      renderBettingStats();
    }

    function betKey(market, jogo) {
      return `footwin_odd_${market}_${jogo.data}_${jogo.casa}_${jogo.fora}`;
    }

    function getOdd(market, jogo) {
      return localStorage.getItem(betKey(market, jogo)) || "";
    }

    function setOdd(market, jogo, value) {
      localStorage.setItem(betKey(market, jogo), value);
    }

    function calcularStake(stackAtual) {
      const valor = Number(stakeValueInput.value || 0);
      const modo = stakeModeSelect.value;

      if (valor <= 0) return 0;

      if (modo === "percent") {
        return stackAtual * (valor / 100);
      }

      return valor;
    }

    function renderSummary(container, stats) {
      container.innerHTML = `
        <div class="bet-stat">
          <span>Stack final</span>
          <strong>${dinheiro(stats.stackFinal)}</strong>
        </div>
        <div class="bet-stat">
          <span>Lucro/Prejuízo</span>
          <strong>${dinheiro(stats.lucro)}</strong>
        </div>
        <div class="bet-stat">
          <span>Apostas fechadas</span>
          <strong>${stats.fechadas}</strong>
        </div>
      `;
    }

    function renderBettingMarket(market, container, summaryContainer) {
      if (!dados || !dados.jogos) return;

      const jogos = getVisibleGames();
      const initialStack = Number(initialStackInput.value || 0);

      let stack = initialStack;
      let fechadas = 0;

      const rows = jogos.map((jogo) => {
        const analise = analisarJogo(jogo);
        const oddValue = getOdd(market, jogo);
        const odd = Number(String(oddValue).replace(",", "."));

        let ganhou = false;

        if (market === "1x2") {
          ganhou = analise.acertouVencedor;
        }

        if (market === "correct_score") {
          ganhou = analise.acertouResultadoExato;
        }

        let resultadoTexto = "-";
        let resultClass = "pending";

        if (analise.temReal && analise.temPrevisao && Number.isFinite(odd) && odd > 0) {
          const stake = calcularStake(stack);
          const retorno = ganhou ? stake * odd : 0;

          stack = stack - stake + retorno;
          fechadas += 1;

          resultadoTexto = ganhou ? dinheiro(retorno) : "0,00€";
          resultClass = ganhou ? "win" : "loss";
        } else if (!analise.temReal) {
          resultadoTexto = "Por jogar";
        } else if (!oddValue) {
          resultadoTexto = "Sem odd";
        }

        const pickText = market === "1x2"
          ? (jogo.prognostico || "Por calcular")
          : `${jogo.previsao_casa || "-"}-${jogo.previsao_fora || "-"}`;

        const storageKey = betKey(market, jogo);

        return `
          <div class="bet-row">
            <div class="bet-game">
              <strong>${escapeHtml(jogo.casa)} vs ${escapeHtml(jogo.fora)}</strong>
              <small>${escapeHtml(pickText)}</small>
            </div>

            <input
              class="odd-input"
              type="text"
              inputmode="decimal"
              placeholder="Odd"
              value="${escapeHtml(oddValue)}"
              data-market="${market}"
              data-key="${escapeHtml(storageKey)}"
              autocomplete="off"
            />

            <button
              class="odd-btn odd-save"
              type="button"
              title="Gravar odd"
              data-action="save-odd"
              data-key="${escapeHtml(storageKey)}"
            >✓</button>

            <button
              class="odd-btn odd-delete"
              type="button"
              title="Apagar odd"
              data-action="delete-odd"
              data-key="${escapeHtml(storageKey)}"
            >×</button>

            <div class="bet-result ${resultClass}">
              ${resultadoTexto}
            </div>
          </div>
        `;
      }).join("");

      container.innerHTML = rows || '<div class="empty">Sem jogos para mostrar.</div>';

      renderSummary(summaryContainer, {
        stackFinal: stack,
        lucro: stack - initialStack,
        fechadas
      });
    }

    function renderBettingStats() {
      renderBettingMarket("1x2", betList1x2, summary1x2);
      renderBettingMarket("correct_score", betListCorrectScore, summaryCorrectScore);
    }

    function preencherGrupos() {
      const grupos = [...new Set(dados.jogos.map(j => j.grupo).filter(Boolean))].sort();

      grupoSelect.innerHTML = '<option value="Todos">Todos os grupos</option>';

      grupos.forEach((grupo) => {
        const option = document.createElement("option");
        option.value = grupo;
        option.textContent = `Grupo ${grupo}`;
        grupoSelect.appendChild(option);
      });
    }

    bettingToggle.addEventListener("click", () => {
      bettingPanel.classList.toggle("open");
      bettingToggle.classList.toggle("active");
      renderBettingStats();
    });

    initialStackInput.addEventListener("input", renderBettingStats);
    stakeValueInput.addEventListener("input", renderBettingStats);
    stakeModeSelect.addEventListener("change", renderBettingStats);

    document.addEventListener("click", (event) => {
      const action = event.target.dataset.action;

      if (action !== "save-odd" && action !== "delete-odd") return;

      const key = event.target.dataset.key;
      if (!key) return;

      const row = event.target.closest(".bet-row");
      const input = row ? row.querySelector(".odd-input") : null;

      if (action === "save-odd") {
        const valor = String(input.value || "").trim().replace(".", ",");

        if (!valor) {
          localStorage.removeItem(key);
        } else {
          localStorage.setItem(key, valor);
        }

        input.value = valor;
        input.classList.add("odd-saved");

        setTimeout(() => {
          input.classList.remove("odd-saved");
        }, 700);

        renderBettingStats();
      }

      if (action === "delete-odd") {
        localStorage.removeItem(key);

        if (input) {
          input.value = "";
        }

        renderBettingStats();
      }
    });

    fetch("./public/previsoes.json?v=" + Date.now(), { cache: "no-store" })
      .then((res) => res.json())
      .then((json) => {
        dados = json;

        totalJogos.textContent = dados.total_jogos || dados.jogos.length || 0;
        atualizadoEm.textContent = `Atualizado em ${dados.atualizado_em || "-"}`;

        preencherGrupos();
        render();
      })
      .catch((err) => {
        console.error(err);
        atualizadoEm.textContent = "Erro ao carregar dados";
        grid.innerHTML = '<div class="empty">Erro ao carregar public/previsoes.json.</div>';
      });

    pesquisaInput.addEventListener("input", render);
    grupoSelect.addEventListener("change", render);
  </script>
</body>
</html>
