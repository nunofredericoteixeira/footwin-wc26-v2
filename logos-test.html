<!doctype html>
<html lang="pt">
<head>

  <title>Teste Logos Footwin</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f2f5f8; padding: 30px; }

    .card { background: white; border-radius: 14px; padding: 14px; text-align: center; }
    img { width: 90px; height: 90px; object-fit: contain; border: 1px solid #ccc; border-radius: 999px; }
  </style>
</head>
<body>

    <div class="card"><img src="./public/logos/haiti.png?v=1"><p>haiti</p></div>
    <div class="card"><img src="./public/logos/australia.png?v=1"><p>australia</p></div>
    <div class="card"><img src="./public/logos/curacao.png?v=1"><p>curacao</p></div>
    <div class="card"><img src="./public/logos/senegal.png?v=1"><p>senegal</p></div>
    <div class="card"><img src="./public/logos/argentina.png?v=1"><p>argentina</p></div>
    <div class="card"><img src="./public/logos/austria.png?v=1"><p>austria</p></div>
    <div class="card"><img src="./public/logos/portugal.png?v=1"><p>portugal</p></div>
    <div class="card"><img src="./public/logos/ghana.png?v=1"><p>ghana</p></div>
    <div class="card"><img src="./public/logos/panama.png?v=1"><p>panama</p></div>

  </div>
</body>
</html>
